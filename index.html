<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQVate</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-black text-white min-h-screen">

    <!-- SIGNUP MODAL -->
    <div id="signup-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[99999]">
        <div class="bg-zinc-900 w-full max-w-md mx-4 rounded-3xl p-10">
            <h2 class="text-4xl font-bold text-center mb-2">Join NQVate</h2>
            <p class="text-center text-zinc-400 mb-8">Create your account</p>

            <div class="grid grid-cols-2 gap-4">
                <input id="first-name" type="text" placeholder="First Name" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
                <input id="last-name" type="text" placeholder="Last Name" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
            </div>

            <input id="username" type="text" placeholder="Username (unique)" class="w-full mt-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
            <input id="email" type="email" placeholder="Email Address" class="w-full mt-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">

            <button onclick="createProfile()" class="w-full mt-8 py-5 bg-white text-black font-semibold rounded-2xl text-lg">
                Create Account
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAXpV2uJmNEj5qe65Mq0ki5cdMXcbaBisE",
          authDomain: "nqv8-2a264.firebaseapp.com",
          projectId: "nqv8-2a264",
          storageBucket: "nqv8-2a264.firebasestorage.app",
          messagingSenderId: "918111164289",
          appId: "1:918111164289:web:e87dc103907eac54f47a80"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;

        async function createProfile() {
            console.log("Create button clicked");

            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            let username = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim();

            if (!firstName || !lastName || !username) {
                return alert("First name, last name, and username are required");
            }

            username = username.replace(/\s+/g, '');

            try {
                const usernameDoc = await db.collection("usernames").doc(username).get();
                if (usernameDoc.exists) return alert("Username already taken");

                await auth.signInAnonymously();

                currentUser = {
                    uid: auth.currentUser.uid,
                    firstName, lastName,
                    username: "@" + username,
                    email,
                    fullName: firstName + " " + lastName
                };

                await db.collection("users").doc(currentUser.uid).set(currentUser);
                await db.collection("usernames").doc(username).set({ uid: currentUser.uid });

                document.getElementById('signup-modal').classList.add('hidden');
                alert("✅ Account created successfully!");
                console.log("Account created");
            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            }
        }

        window.onload = () => console.log("Page loaded");
    </script>
</body>
</html>
