<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQVate • Innovate. Incubate.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --primary: #00d4ff; }
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-link { position: relative; }
        .nav-link:after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background-color: #00d4ff; }
        .nav-link:hover:after { width: 100%; }
        .hero-bg { background: linear-gradient(90deg, #0a0a2e 0%, #1a0b3d 100%); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 212 255 / 0.2); }
        .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .chat-bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[99999] hidden">
        <div class="modal bg-zinc-900 max-w-md w-full mx-4 rounded-3xl p-8">
            <h3 class="text-3xl font-semibold mb-8 text-center">Create Your NQVate Profile</h3>
            <input id="full-name" type="text" placeholder="Full Name" class="w-full bg-black border border-zinc-700 rounded-3xl px-6 py-5 mb-4 text-lg outline-none">
            <input id="email" type="email" placeholder="Email Address (optional)" class="w-full bg-black border border-zinc-700 rounded-3xl px-6 py-5 mb-6 text-lg outline-none">
            <button onclick="createProfile()" class="w-full py-6 bg-gradient-to-r from-cyan-400 to-violet-400 text-black font-semibold rounded-3xl text-lg">
                Create Profile & Continue
            </button>
        </div>
    </div>
