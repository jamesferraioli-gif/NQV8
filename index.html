<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQVate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { content: [] };
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-black text-white min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-2xl font-bold">N</div>
                        <span class="text-3xl font-bold tracking-tighter">NQVate</span>
                    </div>
                    <p class="text-xs text-zinc-400 mt-1 pl-12">
                        A decentralized marketplace for builders and ideas.<br>
                        <span class="text-cyan-400">Innovate. Incubate. NQVate.</span>
                    </p>
                </div>

                <div id="nav-loggedin" class="hidden items-center gap-8 text-sm font-medium">
                    <a onclick="navigateTo('marketplace')" class="hover:text-cyan-400 cursor-pointer">Marketplace</a>
                    <a onclick="navigateTo('ideas')" class="hover:text-cyan-400 cursor-pointer">Ideas</a>
                    <a onclick="navigateTo('chat')" class="hover:text-cyan-400 cursor-pointer">Chat</a>
                    <a onclick="navigateTo('leaderboard')" class="hover:text-cyan-400 cursor-pointer">Leaderboard</a>
                </div>

                <div id="right-section" class="hidden flex items-center gap-4">
                    <button onclick="connectWallet()" class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 border border-cyan-400 text-cyan-400 px-5 py-2.5 rounded-2xl text-sm font-medium">
                        <i class="fa-solid fa-wallet"></i> Connect Wallet
                    </button>

                    <div class="relative">
                        <div onclick="toggleProfileMenu()" class="cursor-pointer">
                            <div id="profile-avatar" class="w-9 h-9 bg-gradient-to-br from-violet-500 to-cyan-500 rounded-full flex items-center justify-center text-sm font-bold ring-2 ring-cyan-400 overflow-hidden"></div>
                        </div>
                        <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-[99999]">
                            <div class="px-6 py-4 border-b border-zinc-700">
                                <p class="font-semibold" id="dropdown-name">John Doe</p>
                                <p class="text-xs text-zinc-500" id="dropdown-username">@johndoe</p>
                            </div>
                            <button onclick="viewProfile()" class="w-full text-left px-6 py-3 hover:bg-zinc-800 flex items-center gap-3">
                                👤 View Profile
                            </button>
                            <button onclick="logout()" class="w-full text-left px-6 py-3 text-red-400 hover:bg-zinc-800">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[99999]">
        <div class="bg-zinc-900 w-full max-w-md mx-4 rounded-3xl p-10">
            <div class="flex border-b border-zinc-700 mb-6">
                <button onclick="switchTab(0)" id="tab-create" class="flex-1 pb-4 text-lg font-semibold border-b-2 border-cyan-400">Create Account</button>
                <button onclick="switchTab(1)" id="tab-login" class="flex-1 pb-4 text-lg font-semibold text-zinc-400">Login</button>
            </div>

            <!-- CREATE ACCOUNT -->
            <div id="create-form">
                <div class="grid grid-cols-2 gap-4">
                    <input id="first-name" type="text" placeholder="First Name" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
                    <input id="last-name" type="text" placeholder="Last Name" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
                </div>
                <input id="create-username" type="text" placeholder="Username (unique)" class="w-full mt-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
                <input id="create-email" type="email" placeholder="Email Address" class="w-full mt-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
                <input id="create-password" type="password" placeholder="Password (min 6 chars)" class="w-full mt-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
                
                <button onclick="createProfile()" class="w-full mt-8 py-5 bg-white text-black font-semibold rounded-2xl text-lg">
                    Create Account
                </button>
            </div>

            <!-- LOGIN -->
            <div id="login-form" class="hidden">
                <input id="login-email" type="email" placeholder="Email Address" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
                <input id="login-password" type="password" placeholder="Password" class="w-full mt-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none">
                
                <button onclick="loginWithEmail()" class="w-full mt-6 py-5 bg-white text-black font-semibold rounded-2xl text-lg">
                    Login
                </button>
                
                <p onclick="resetPassword()" class="text-center text-cyan-400 text-sm mt-4 cursor-pointer hover:underline">
                    Forgot Password?
                </p>
            </div>
        </div>
    </div>

    <!-- PROFILE PAGE (Full Features) -->
    <div id="profile-page" class="max-w-5xl mx-auto pt-8 px-6 hidden">
        <!-- (Same rich profile page as before) -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold">My Profile</h1>
            <button onclick="navigateTo('marketplace')" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">← Back</button>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8 mb-8">
            <div class="flex flex-col md:flex-row gap-8 items-center md:items-start">
                <div onclick="editProfile()" class="cursor-pointer">
                    <div id="profile-avatar-large" class="w-32 h-32 bg-gradient-to-br from-violet-500 to-cyan-500 rounded-3xl flex items-center justify-center text-6xl font-bold ring-4 ring-cyan-400 overflow-hidden"></div>
                </div>
                <div class="flex-1 text-center md:text-left">
                    <div class="flex flex-col md:flex-row md:items-center gap-3">
                        <p id="profile-fullname" class="text-4xl font-bold">John Doe</p>
                        <button onclick="editProfile()" class="px-5 py-2 bg-cyan-500 hover:bg-cyan-400 text-black rounded-2xl text-sm font-semibold flex items-center gap-2">
                            <i class="fas fa-edit"></i> Edit Profile
                        </button>
                    </div>
                    <p id="profile-username" class="text-cyan-400 text-2xl">@johndoe</p>
                    <p id="profile-email" class="text-zinc-400"></p>
                    <p id="profile-bio" class="mt-6 text-zinc-300 leading-relaxed text-lg"></p>
                </div>
            </div>
        </div>

        <!-- Wallet, Stats, Projects sections (same as previous) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 bg-zinc-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4">Wallet</h2>
                <div class="bg-black rounded-2xl p-4 font-mono text-sm" id="wallet-address">Not Connected</div>
                <button onclick="connectWallet()" class="mt-4 w-full py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Connect Wallet</button>
            </div>

            <div class="lg:col-span-2 bg-zinc-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4">Activity</h2>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div class="bg-black/50 rounded-2xl p-4">
                        <p class="text-3xl font-bold text-cyan-400" id="stat-projects">0</p>
                        <p class="text-xs text-zinc-400 mt-1">Projects</p>
                    </div>
                    <div class="bg-black/50 rounded-2xl p-4">
                        <p class="text-3xl font-bold text-cyan-400">47</p>
                        <p class="text-xs text-zinc-400 mt-1">Ideas</p>
                    </div>
                    <div class="bg-black/50 rounded-2xl p-4">
                        <p class="text-3xl font-bold text-cyan-400">8.2k</p>
                        <p class="text-xs text-zinc-400 mt-1">Reputation</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 bg-zinc-900 rounded-3xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold">My Projects</h2>
                    <button onclick="newProject()" class="px-5 py-2 bg-white text-black rounded-2xl hover:bg-cyan-400">+ New Project</button>
                </div>
                <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Edit Modal and Marketplace (same as before) -->
    <!-- ... Edit Modal code from previous version ... -->

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDnUVkD4WZ_jpHK1cY1G_1DOvHSfkUropU",
          authDomain: "nqv8-9092f.firebaseapp.com",
          projectId: "nqv8-9092f",
          storageBucket: "nqv8-9092f.firebasestorage.app",
          messagingSenderId: "199645894982",
          appId: "1:199645894982:web:c5a192a4b553b9747e2d47"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();

        let currentUser = null;
        let currentAvatarFile = null;

        // Navigation & Profile Functions (same as before)
        function navigateTo(page) {
            document.querySelectorAll('div[id$="-page"]').forEach(div => div.classList.add('hidden'));
            document.getElementById(page + '-page').classList.remove('hidden');
        }

        function viewProfile() {
            toggleProfileMenu();
            navigateTo('profile');
            updateProfileUI();
            loadUserProjects();
        }

        function toggleProfileMenu() {
            document.getElementById('profile-dropdown').classList.toggle('hidden');
        }

        // ... (updateProfileUI, editProfile, saveProfile, loadUserProjects, newProject functions remain the same as last full version)

        // ==================== FULL AUTH FUNCTIONS ====================
        function switchTab(tab) {
            document.getElementById('create-form').classList.toggle('hidden', tab === 1);
            document.getElementById('login-form').classList.toggle('hidden', tab === 0);
            
            document.getElementById('tab-create').classList.toggle('border-b-2', tab === 0);
            document.getElementById('tab-create').classList.toggle('text-white', tab === 0);
            document.getElementById('tab-create').classList.toggle('text-zinc-400', tab === 1);
            
            document.getElementById('tab-login').classList.toggle('border-b-2', tab === 1);
            document.getElementById('tab-login').classList.toggle('text-white', tab === 1);
            document.getElementById('tab-login').classList.toggle('text-zinc-400', tab === 0);
        }

        async function createProfile() {
            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            let username = document.getElementById('create-username').value.trim().toLowerCase();
            const email = document.getElementById('create-email').value.trim();
            const password = document.getElementById('create-password').value.trim();

            if (!firstName || !lastName || !username || !email || !password) return alert("All fields are required");

            try {
                const usernameDoc = await db.collection("usernames").doc(username).get();
                if (usernameDoc.exists) return alert("Username already taken");

                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await userCredential.user.sendEmailVerification();

                const userData = {
                    uid: userCredential.user.uid,
                    firstName, lastName,
                    fullName: firstName + " " + lastName,
                    username: "@" + username,
                    email,
                    bio: "",
                    photoURL: null
                };

                await db.collection("users").doc(userCredential.user.uid).set(userData);
                await db.collection("usernames").doc(username).set({ uid: userCredential.user.uid });

                alert("✅ Account created! Please check your email to verify.");
                switchTab(1);
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        async function loginWithEmail() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) return alert("Email and password required");

            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                if (!cred.user.emailVerified) {
                    return alert("Please verify your email first.");
                }

                const doc = await db.collection("users").doc(cred.user.uid).get();
                if (doc.exists) {
                    currentUser = doc.data();
                    finishLogin();
                }
            } catch (err) {
                alert("Login failed: " + err.message);
            }
        }

        function resetPassword() {
            const email = document.getElementById('login-email').value.trim();
            if (!email) return alert("Enter your email first");
            auth.sendPasswordResetEmail(email).then(() => alert("Password reset link sent!"));
        }

        function finishLogin() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('nav-loggedin').classList.remove('hidden');
            document.getElementById('right-section').classList.remove('hidden');
            navigateTo('marketplace');
            updateProfileUI();
        }

        function logout() { auth.signOut().then(() => location.reload()); }
        function connectWallet() { alert("Wallet coming soon"); }

        // Init
        window.onload = () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    db.collection("users").doc(user.uid).get().then(doc => {
                        if (doc.exists) {
                            currentUser = doc.data();
                            finishLogin();
                        }
                    });
                } else {
                    document.getElementById('auth-modal').classList.remove('hidden');
                }
            });
        };
    </script>
</body>
</html>
