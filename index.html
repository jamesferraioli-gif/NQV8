<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQVate • Innovate. Incubate.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --primary: #00d4ff; }
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-link { position: relative; }
        .nav-link:after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background-color: #00d4ff; }
        .nav-link:hover:after { width: 100%; }
        .hero-bg { background: linear-gradient(90deg, #0a0a2e 0%, #1a0b3d 100%); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 212 255 / 0.2); }
        .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .chat-bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[99999] hidden">
        <div class="modal bg-zinc-900 max-w-md w-full mx-4 rounded-3xl p-8">
            <h3 class="text-3xl font-semibold mb-8 text-center">Create Your NQVate Profile</h3>
            <input id="full-name" type="text" placeholder="Full Name" class="w-full bg-black border border-zinc-700 rounded-3xl px-6 py-5 mb-4 text-lg outline-none">
            <input id="email" type="email" placeholder="Email Address" class="w-full bg-black border border-zinc-700 rounded-3xl px-6 py-5 mb-6 text-lg outline-none">
            <button onclick="createProfile()" class="w-full py-6 bg-gradient-to-r from-cyan-400 to-violet-400 text-black font-semibold rounded-3xl text-lg">
                Create Profile & Continue
            </button>
        </div>
    </div>

    <!-- DISCLAIMER -->
    <div class="bg-amber-400/10 border-b border-amber-400/30 py-3 text-center text-xs text-amber-400">
        NQVate is a neutral platform. We are <strong>not a party</strong> to any transactions, equity, NDAs or business deals.
    </div>

    <!-- NAVBAR -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-2xl font-bold">N</div>
                <span class="text-3xl font-semibold tracking-tighter" style="font-family: 'Space Grotesk', sans-serif;">NQVate</span>
            </div>
            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a onclick="navigateTo('marketplace')" class="nav-link cursor-pointer flex items-center gap-x-1"><i class="fa-solid fa-store"></i> Marketplace</a>
                <a onclick="navigateTo('ideas')" class="nav-link cursor-pointer flex items-center gap-x-1"><i class="fa-solid fa-lightbulb"></i> Ideas</a>
                <a onclick="navigateTo('chats')" class="nav-link cursor-pointer flex items-center gap-x-1"><i class="fa-solid fa-comments"></i> Chats</a>
                <a onclick="navigateTo('leaderboard')" class="nav-link cursor-pointer flex items-center gap-x-1"><i class="fa-solid fa-trophy"></i> Leaderboard</a>
                <a onclick="navigateTo('profile')" class="nav-link cursor-pointer flex items-center gap-x-1"><i class="fa-solid fa-user"></i> Profile</a>
            </div>
            <div class="flex items-center gap-x-4">
                <div onclick="connectWallet()" id="wallet-btn" class="cursor-pointer flex items-center gap-x-2 bg-zinc-900 hover:bg-zinc-800 border border-cyan-400 text-cyan-400 px-5 h-10 rounded-3xl text-sm font-semibold">
                    <i class="fa-brands fa-ethereum"></i> <span id="wallet-text">Connect Wallet</span>
                </div>
                <div onclick="fakeNotification()" class="relative w-10 h-10 flex items-center justify-center bg-zinc-900 hover:bg-zinc-800 rounded-2xl cursor-pointer border border-zinc-700">
                    <i class="fa-solid fa-bell"></i>
                </div>

                <!-- Profile Dropdown -->
                <div id="profile-container" class="relative">
                    <div onclick="toggleProfileMenu()" class="cursor-pointer flex items-center gap-x-2">
                        <div id="profile-avatar" class="w-8 h-8 bg-gradient-to-br from-violet-400 to-cyan-400 rounded-2xl flex items-center justify-center text-sm font-bold">JF</div>
                    </div>
                    <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-[99999]">
                        <div class="px-6 py-4 border-b border-zinc-700">
                            <p class="font-semibold" id="dropdown-username">@jimferraioli</p>
                            <p class="text-xs text-zinc-500">Logged in</p>
                        </div>
                        <a onclick="navigateTo('profile')" class="block px-6 py-3 hover:bg-zinc-800 cursor-pointer">👤 My Profile</a>
                        <button onclick="logout()" class="w-full text-left px-6 py-3 text-red-400 hover:bg-zinc-800 flex items-center gap-x-2">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- The rest of your HTML (Hero, Marketplace, Ideas, Chats, etc.) is exactly as before -->
    <!-- ... paste all your original sections here (from HERO to the end of the chat modal) ... -->

    <script>
        // ==================== STATE ====================
        let nqv8Balance = 2840;
        let profileCreated = false;
        let currentUser = "@jimferraioli";
        let myPostedProjects = [];
        let ideas = [];
        let chats = [];
        let currentChatId = null;
        let currentPostType = 0;

        function loadFromStorage() {
            if (localStorage.getItem('nqv8Balance')) nqv8Balance = parseFloat(localStorage.getItem('nqv8Balance'));
            if (localStorage.getItem('myPostedProjects')) myPostedProjects = JSON.parse(localStorage.getItem('myPostedProjects'));
            if (localStorage.getItem('ideas')) ideas = JSON.parse(localStorage.getItem('ideas'));
            if (localStorage.getItem('chats')) chats = JSON.parse(localStorage.getItem('chats'));
            if (localStorage.getItem('profileCreated')) profileCreated = JSON.parse(localStorage.getItem('profileCreated'));
            if (localStorage.getItem('currentUser')) currentUser = localStorage.getItem('currentUser');
        }

        function saveToStorage() {
            localStorage.setItem('nqv8Balance', nqv8Balance);
            localStorage.setItem('myPostedProjects', JSON.stringify(myPostedProjects));
            localStorage.setItem('ideas', JSON.stringify(ideas));
            localStorage.setItem('chats', JSON.stringify(chats));
            localStorage.setItem('profileCreated', JSON.stringify(profileCreated));
            localStorage.setItem('currentUser', currentUser);
        }

        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed;bottom:24px;right:24px;padding:16px 24px;border-radius:9999px;font-size:14px;font-weight:600;z-index:99999;${type === 'success' ? 'background:#10b981;color:#000' : 'background:#ef4444;color:#fff'}`;
            toast.innerHTML = `${type === 'success' ? '✅' : '⚠️'} ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        function deductNqv8(amount, reason) {
            if (nqv8Balance < amount) {
                showToast(`Not enough NQV8 for ${reason}`, "error");
                return false;
            }
            nqv8Balance -= amount;
            saveToStorage();
            if (document.getElementById('nqv8-balance')) document.getElementById('nqv8-balance').textContent = Math.floor(nqv8Balance);
            return true;
        }

        // ==================== FIXED AUTH ====================
        function createProfile() {
            const name = document.getElementById('full-name').value.trim();
            if (!name) return showToast("Please enter your name", "error");

            profileCreated = true;
            currentUser = "@" + name.toLowerCase().replace(/\s+/g, '');
            saveToStorage();
            document.getElementById('login-modal').classList.add('hidden');
            updateProfileUI();
            showToast(`✅ Welcome, ${currentUser}!`);
            renderAll();
        }

        function logout() {
            if (!confirm("Logout from NQVate?")) return;
            localStorage.clear();
            location.reload();
        }

        function updateProfileUI() {
            document.getElementById('profile-avatar').textContent = currentUser.substring(1, 3).toUpperCase();
            document.getElementById('dropdown-username').textContent = currentUser;
        }

        function toggleProfileMenu() {
            document.getElementById('profile-dropdown').classList.toggle('hidden');
        }

        document.addEventListener('click', (e) => {
            if (!document.getElementById('profile-container').contains(e.target)) {
                document.getElementById('profile-dropdown').classList.add('hidden');
            }
        });

        // ==================== Your Original Functions (unchanged) ====================
        // Paste all the functions from your working code here (connectWallet, navigateTo, renderAll, submitProject, renderMarketplace, etc.)

        window.onload = () => {
            loadFromStorage();
            updateProfileUI();

            if (!profileCreated) document.getElementById('login-modal').classList.remove('hidden');
            renderAll();
        };
    </script>
</body>
</html>
