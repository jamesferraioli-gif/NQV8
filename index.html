<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQVate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { content: [] };</script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-black text-white min-h-screen">

    <!-- Navbar and all HTML sections remain the same as previous version -->

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDnUVkD4WZ_jpHK1cY1G_1DOvHSfkUropU",
          authDomain: "nqv8-9092f.firebaseapp.com",
          projectId: "nqv8-9092f",
          storageBucket: "nqv8-9092f.firebasestorage.app",
          messagingSenderId: "199645894982",
          appId: "1:199645894982:web:c5a192a4b553b9747e2d47"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();

        let currentUser = null;
        let currentAvatarFile = null;

        // === NAV & PROFILE FUNCTIONS (shortened for space) ===
        function navigateTo(page) {
            document.querySelectorAll('div[id$="-page"]').forEach(d => d.classList.add('hidden'));
            document.getElementById(page + '-page').classList.remove('hidden');
        }

        function viewProfile() { toggleProfileMenu(); navigateTo('profile'); updateProfileUI(); loadUserProjects(); }
        function toggleProfileMenu() { document.getElementById('profile-dropdown').classList.toggle('hidden'); }

        // Full auth functions
        function switchTab(tab) {
            document.getElementById('create-form').classList.toggle('hidden', tab === 1);
            document.getElementById('login-form').classList.toggle('hidden', tab === 0);
            // tab styling...
            document.getElementById('tab-create').classList.toggle('border-b-2', tab === 0);
            document.getElementById('tab-create').classList.toggle('text-white', tab === 0);
            document.getElementById('tab-login').classList.toggle('border-b-2', tab === 1);
            document.getElementById('tab-login').classList.toggle('text-white', tab === 1);
        }

        async function createProfile() {
            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            let username = document.getElementById('create-username').value.trim().toLowerCase();
            const email = document.getElementById('create-email').value.trim();
            const password = document.getElementById('create-password').value.trim();

            if (!firstName || !lastName || !username || !email || !password) 
                return alert("All fields are required!");

            try {
                const usernameDoc = await db.collection("usernames").doc(username).get();
                if (usernameDoc.exists) return alert("Username already taken");

                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await userCredential.user.sendEmailVerification();

                const userData = {
                    uid: userCredential.user.uid,
                    firstName, lastName,
                    fullName: firstName + " " + lastName,
                    username: "@" + username,
                    email,
                    bio: "",
                    photoURL: null
                };

                await db.collection("users").doc(userCredential.user.uid).set(userData);
                await db.collection("usernames").doc(username).set({ uid: userCredential.user.uid });

                alert("✅ Account created!\n\nPlease check your email and click the verification link, then come back to login.");
                switchTab(1);
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        async function loginWithEmail() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                if (!cred.user.emailVerified) {
                    return alert("Please verify your email first before logging in.");
                }
                const doc = await db.collection("users").doc(cred.user.uid).get();
                if (doc.exists) {
                    currentUser = doc.data();
                    finishLogin();
                }
            } catch (err) {
                alert("Login failed: " + err.message);
            }
        }

        function finishLogin() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('nav-loggedin').classList.remove('hidden');
            document.getElementById('right-section').classList.remove('hidden');
            navigateTo('marketplace');
            updateProfileUI();
        }

        // Other functions (updateProfileUI, editProfile, saveProfile, etc.) are the same as before

        window.onload = () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    db.collection("users").doc(user.uid).get().then(doc => {
                        if (doc.exists) {
                            currentUser = doc.data();
                            finishLogin();
                        }
                    });
                } else {
                    document.getElementById('auth-modal').classList.remove('hidden');
                }
            });
        };
    </script>
</body>
</html>
