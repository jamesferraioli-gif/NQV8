<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQVate</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .feed-container { max-width: 680px; }
    </style>
</head>
<body class="bg-black text-white min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-2xl font-bold">N</div>
                    <span class="text-3xl font-bold tracking-tighter logo-font text-white">NQVate</span>
                </div>
            </div>

            <div id="nav-loggedin" class="hidden flex items-center gap-8 text-sm font-medium">
                <a onclick="navigateTo('feed')" class="flex items-center gap-2 hover:text-cyan-400 cursor-pointer"><i class="fa-solid fa-house"></i> Home</a>
                <a onclick="navigateTo('explore')" class="flex items-center gap-2 hover:text-cyan-400 cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i> Explore</a>
                <a onclick="navigateTo('profile')" class="flex items-center gap-2 hover:text-cyan-400 cursor-pointer"><i class="fa-solid fa-user"></i> Profile</a>
            </div>

            <div id="profile-section" class="hidden flex items-center gap-4">
                <div onclick="toggleProfileMenu()" class="cursor-pointer">
                    <div id="profile-avatar" class="w-9 h-9 bg-gradient-to-br from-violet-500 to-cyan-500 rounded-full flex items-center justify-center text-sm font-bold ring-2 ring-cyan-400">JF</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[99999] hidden">
        <div class="bg-zinc-900 w-full max-w-md mx-4 rounded-3xl p-10">
            <h2 class="text-4xl font-bold text-center mb-2 logo-font">Join NQVate</h2>
            <p class="text-zinc-400 text-center mb-8">The future of decentralized social</p>
            
            <input id="full-name" type="text" placeholder="Full Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 mb-4 text-lg outline-none focus:border-cyan-400">
            <button onclick="createProfile()" class="w-full py-5 bg-white text-black font-semibold rounded-2xl text-lg hover:bg-cyan-400 transition">
                Create Account
            </button>
        </div>
    </div>

    <!-- MAIN FEED -->
    <div id="feed-page" class="max-w-2xl mx-auto pt-8 px-4">
        <!-- Post Composer -->
        <div class="bg-zinc-900 rounded-3xl p-6 mb-8 border border-zinc-800">
            <textarea id="post-input" rows="3" placeholder="What are you building today?" class="w-full bg-transparent outline-none text-lg resize-none"></textarea>
            <div class="flex justify-between items-center mt-4">
                <div class="text-cyan-400 text-sm cursor-pointer hover:text-cyan-300">📸 Media</div>
                <button onclick="createPost()" class="px-8 py-3 bg-white text-black font-semibold rounded-2xl hover:bg-cyan-400 transition">Post</button>
            </div>
        </div>

        <!-- Posts Feed -->
        <div id="posts-feed" class="space-y-6"></div>
    </div>

    <!-- PROFILE PAGE -->
    <div id="profile-page" class="max-w-2xl mx-auto pt-8 px-4 hidden">
        <div class="bg-zinc-900 rounded-3xl p-8 text-center">
            <div id="profile-avatar-big" class="w-24 h-24 mx-auto bg-gradient-to-br from-violet-500 to-cyan-500 rounded-full flex items-center justify-center text-5xl font-bold mb-6">JF</div>
            <h2 id="profile-name" class="text-3xl font-bold">Username</h2>
            <p id="profile-username" class="text-cyan-400">@username</p>
        </div>
        <div class="mt-8">
            <h3 class="text-xl font-semibold mb-4">My Posts</h3>
            <div id="my-posts" class="space-y-6"></div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
          apiKey: "AIzaSyAXpV2uJmNEj5qe65Mq0ki5cdMXcbaBisE",
          authDomain: "nqv8-2a264.firebaseapp.com",
          projectId: "nqv8-2a264",
          storageBucket: "nqv8-2a264.firebasestorage.app",
          messagingSenderId: "918111164289",
          appId: "1:918111164289:web:e87dc103907eac54f47a80"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;

        // ==================== AUTH ====================
        async function createProfile() {
            const name = document.getElementById('full-name').value.trim();
            if (!name) return alert("Please enter your name");

            try {
                await auth.signInAnonymously();
                currentUser = {
                    uid: auth.currentUser.uid,
                    displayName: name,
                    username: "@" + name.toLowerCase().replace(/\s+/g, '')
                };

                await db.collection("users").doc(currentUser.uid).set({
                    displayName: currentUser.displayName,
                    username: currentUser.username,
                    createdAt: new Date()
                });

                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('nav-loggedin').classList.remove('hidden');
                showFeed();
            } catch (err) {
                console.error(err);
                alert("Failed to create account. Please make sure Anonymous auth is enabled in Firebase.");
            }
        }

        function logout() {
            if (confirm("Logout?")) auth.signOut().then(() => location.reload());
        }

        // ==================== POSTS ====================
        async function createPost() {
            const text = document.getElementById('post-input').value.trim();
            if (!text || !currentUser) return;

            await db.collection("posts").add({
                userId: currentUser.uid,
                username: currentUser.username,
                displayName: currentUser.displayName,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                likes: 0
            });

            document.getElementById('post-input').value = '';
            loadFeed();
        }

        async function loadFeed() {
            const feed = document.getElementById('posts-feed');
            feed.innerHTML = '';

            const snapshot = await db.collection("posts").orderBy("timestamp", "desc").get();
            
            snapshot.forEach(doc => {
                const post = doc.data();
                feed.innerHTML += `
                    <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gradient-to-br from-violet-400 to-cyan-400 rounded-full flex items-center justify-center text-lg font-bold">
                                ${post.username ? post.username[1].toUpperCase() : 'U'}
                            </div>
                            <div>
                                <div class="font-semibold">${post.displayName || post.username}</div>
                                <div class="text-xs text-zinc-500">${post.username}</div>
                            </div>
                        </div>
                        <p class="mt-4 text-[17px] leading-relaxed">${post.text}</p>
                        <div class="mt-6 flex gap-8 text-sm">
                            <button onclick="likePost('${doc.id}')" class="flex items-center gap-2 hover:text-pink-400">
                                ❤️ <span>${post.likes || 0}</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        async function likePost(postId) {
            await db.collection("posts").doc(postId).update({
                likes: firebase.firestore.FieldValue.increment(1)
            });
            loadFeed();
        }

        // ==================== NAV ====================
        function navigateTo(page) {
            document.getElementById('feed-page').classList.add('hidden');
            document.getElementById('profile-page').classList.add('hidden');

            if (page === 'feed') {
                document.getElementById('feed-page').classList.remove('hidden');
                loadFeed();
            } else if (page === 'profile') {
                document.getElementById('profile-page').classList.remove('hidden');
            }
        }

        function showFeed() {
            navigateTo('feed');
        }

        // ==================== INIT ====================
        window.onload = () => {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = { uid: user.uid };
                    document.getElementById('login-modal').classList.add('hidden');
                    document.getElementById('nav-loggedin').classList.remove('hidden');
                    showFeed();
                } else {
                    document.getElementById('login-modal').classList.remove('hidden');
                }
            });
        };
    </script>
</body>
</html>
