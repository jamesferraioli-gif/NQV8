<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQVate • Innovate. Incubate.</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .nav-link { position: relative; }
        .nav-link:after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background-color: #00d4ff; }
        .nav-link:hover:after { width: 100%; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[99999] hidden">
        <div class="bg-zinc-900 max-w-md w-full mx-4 rounded-3xl p-8">
            <h3 class="text-3xl font-semibold mb-8 text-center">Create Your NQVate Profile</h3>
            <input id="full-name" type="text" placeholder="Full Name" class="w-full bg-black border border-zinc-700 rounded-3xl px-6 py-5 mb-6 text-lg outline-none">
            <button onclick="createProfile()" class="w-full py-6 bg-gradient-to-r from-cyan-400 to-violet-400 text-black font-semibold rounded-3xl text-lg">
                Create Profile & Continue
            </button>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-2xl font-bold">N</div>
                <span class="text-3xl font-semibold tracking-tighter">NQVate</span>
            </div>
            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a onclick="navigateTo('marketplace')" class="nav-link cursor-pointer">Marketplace</a>
                <a onclick="navigateTo('ideas')" class="nav-link cursor-pointer">Ideas</a>
                <a onclick="navigateTo('chats')" class="nav-link cursor-pointer">Chats</a>
                <a onclick="navigateTo('leaderboard')" class="nav-link cursor-pointer">Leaderboard</a>
                <a onclick="navigateTo('profile')" class="nav-link cursor-pointer">Profile</a>
            </div>
            <div class="flex items-center gap-x-4">
                <div id="profile-container" class="relative hidden">
                    <div onclick="toggleProfileMenu()" class="cursor-pointer flex items-center gap-x-2">
                        <div id="profile-avatar" class="w-8 h-8 bg-gradient-to-br from-violet-400 to-cyan-400 rounded-2xl flex items-center justify-center text-sm font-bold">JF</div>
                    </div>
                    <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-[99999]">
                        <div class="px-6 py-4 border-b border-zinc-700">
                            <p class="font-semibold" id="dropdown-username">@jimferraioli</p>
                        </div>
                        <a onclick="navigateTo('profile')" class="block px-6 py-3 hover:bg-zinc-800 cursor-pointer">👤 My Profile</a>
                        <button onclick="logout()" class="w-full text-left px-6 py-3 text-red-400 hover:bg-zinc-800">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO + All your sections (Marketplace, Ideas, Chats, etc.) remain the same as your last version -->

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
          apiKey: "AIzaSyAXpV2uJmNEj5qe65Mq0ki5cdMXcbaBisE",
          authDomain: "nqv8-2a264.firebaseapp.com",
          projectId: "nqv8-2a264",
          storageBucket: "nqv8-2a264.firebasestorage.app",
          messagingSenderId: "918111164289",
          appId: "1:918111164289:web:e87dc103907eac54f47a80"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // STATE
        let profileCreated = false;
        let currentUser = "@guest";
        let myPostedProjects = [];
        let ideas = [];
        let chats = [];

        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed;bottom:24px;right:24px;padding:16px 24px;border-radius:9999px;font-size:14px;font-weight:600;z-index:99999;${type === 'success' ? 'background:#10b981;color:#000' : 'background:#ef4444;color:#fff'}`;
            toast.innerHTML = `${type === 'success' ? '✅' : '⚠️'} ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        // ==================== AUTH ====================
        async function createProfile() {
            const name = document.getElementById('full-name').value.trim();
            if (!name) return showToast("Please enter your name", "error");

            try {
                await auth.signInAnonymously();
                profileCreated = true;
                currentUser = "@" + name.toLowerCase().replace(/\s+/g, '');

                await db.collection("users").doc(auth.currentUser.uid).set({
                    username: currentUser,
                    profileCreated: true
                }, { merge: true });

                document.getElementById('login-modal').classList.add('hidden');
                updateProfileUI();
                showToast(`✅ Welcome, ${currentUser}!`);
                renderAll();
            } catch (err) {
                console.error(err);
                showToast("Failed to create profile. Check Firebase Anonymous auth is enabled.", "error");
            }
        }

        function logout() {
            if (!confirm("Logout?")) return;
            auth.signOut().then(() => location.reload());
        }

        function updateProfileUI() {
            document.getElementById('profile-avatar').textContent = currentUser.substring(1, 3).toUpperCase();
            document.getElementById('dropdown-username').textContent = currentUser;
        }

        function toggleProfileMenu() {
            document.getElementById('profile-dropdown').classList.toggle('hidden');
        }

        // ==================== NAV & RENDER ====================
        function navigateTo(page) {
            if (!profileCreated) return showToast("Create profile first", "error");
            document.querySelectorAll('div[id$="-section"]').forEach(s => s.classList.add('hidden'));
            const section = document.getElementById(page + '-section');
            if (section) section.classList.remove('hidden');
        }

        function renderAll() {
            renderMarketplace();
            renderIdeas();
            renderYourChats();
            renderProfile();
        }

        // ==================== Your original functions (kept working) ====================
        // Add all your functions here (submitProject, showPostIdeaModal, etc.)

        window.onload = () => {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    profileCreated = true;
                    currentUser = "@user" + user.uid.substring(0,6); // temporary
                    updateProfileUI();
                    renderAll();
                } else {
                    document.getElementById('login-modal').classList.remove('hidden');
                }
            });
        };
    </script>
</body>
</html>
